# ============================================================
# Zero-Trust Network Policies for Cinema App
#
# Strategy: deny-all by default, then add explicit allow rules
# for each required communication path only.
# ============================================================

# 1. Default deny-all: blocks all ingress AND egress for every
#    pod in the cinema namespace unless another policy allows it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-default
  namespace: cinema
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# 2. Allow DNS egress for every pod so in-cluster service
#    discovery (e.g. cinema-postgres-service) works.
#    Port 53 UDP/TCP is required by kube-dns.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: cinema
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# 3. Allow the Nginx Ingress Controller (running in the
#    ingress-nginx namespace) to reach the frontend pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: cinema
spec:
  podSelector:
    matchLabels:
      app: cinema-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
# 4. Allow the Ingress controller to reach the backend API
#    directly (for /api/* paths routed by the Ingress rule).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-backend
  namespace: cinema
spec:
  podSelector:
    matchLabels:
      app: cinema-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000
---
# 5. Allow frontend pods to egress to the backend service.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress-to-backend
  namespace: cinema
spec:
  podSelector:
    matchLabels:
      app: cinema-frontend
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 5000
---
# 6. Allow backend pods to receive traffic from the frontend.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: cinema
spec:
  podSelector:
    matchLabels:
      app: cinema-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cinema-frontend
      ports:
        - protocol: TCP
          port: 5000
---
# 7. Allow backend pods to egress to PostgreSQL on port 5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress-to-db
  namespace: cinema
spec:
  podSelector:
    matchLabels:
      app: cinema-backend
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 5432
---
# 8. Allow the migration job to egress to PostgreSQL.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-migrate-egress-to-db
  namespace: cinema
spec:
  podSelector:
    matchLabels:
      app: cinema-migrate
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 5432
---
# 9. Allow the PostgreSQL pod to receive connections from
#    the backend and migration job on port 5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-db
  namespace: cinema
spec:
  podSelector:
    matchLabels:
      app: cinema-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cinema-backend
        - podSelector:
            matchLabels:
              app: cinema-migrate
      ports:
        - protocol: TCP
          port: 5432
---
# 10. Allow backend pods to send email via Gmail SMTP.
#     nodemailer uses port 465 (SSL) or 587 (STARTTLS).
#     Without this policy the default-deny rule silently drops
#     all outbound SMTP traffic, breaking the forgot-password
#     OTP email flow.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress-smtp
  namespace: cinema
spec:
  podSelector:
    matchLabels:
      app: cinema-backend
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 465   # Gmail SMTP over SSL
        - protocol: TCP
          port: 587   # Gmail SMTP over STARTTLS
