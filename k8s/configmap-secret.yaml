apiVersion: v1
kind: Secret
metadata:
  name: cinema-secrets
  namespace: cinema
type: Opaque
# ⚠️  DO NOT use these placeholder values in a real deployment.
# This file is a TEMPLATE only — it is safe to commit to git
# because the values below are intentionally fake.
#
# Create the real secret with kubectl (never commit real passwords):
#
#   kubectl create secret generic cinema-secrets \
#     --namespace cinema \
#     --from-literal=DB_PASSWORD="$(openssl rand -base64 32)" \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 64)" \
#     --from-literal=EMAIL_USER="your-gmail@gmail.com" \
#     --from-literal=EMAIL_PASS="your-gmail-app-password"
#
# The DB_PASSWORD here and in the postgres pod must match.
stringData:
  DB_PASSWORD: CHANGE_ME_use_kubectl_create_secret
  JWT_SECRET: CHANGE_ME_use_kubectl_create_secret
  EMAIL_USER: CHANGE_ME_your-gmail@gmail.com
  EMAIL_PASS: CHANGE_ME_your-gmail-app-password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cinema-config
  namespace: cinema
data:
  # DB_HOST points to the plain PostgreSQL ClusterIP service.
  DB_HOST: cinema-postgres-service
  DB_PORT: "5432"
  DB_NAME: cinema_db
  DB_USER: cinema_user
  NODE_ENV: production
  PORT: "5000"
  SEAT_LOCK_TTL: "600"
  JWT_EXPIRES_IN: 7d
  # Set this to your real HTTPS domain after TLS is configured
  # (e.g. https://yourdomain.com). Update before deploying.
  FRONTEND_URL: https://garryserver.tech
