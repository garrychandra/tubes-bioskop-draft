apiVersion: v1
kind: Secret
metadata:
  name: cinema-secrets
  namespace: cinema
type: Opaque
stringData:
  DB_PASSWORD: cinema_pass
  JWT_SECRET: your-super-secret-jwt-key-change-in-production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cinema-config
  namespace: cinema
data:
  DB_HOST: cinema-postgres-service
  DB_PORT: "5432"
  DB_NAME: cinema_db
  DB_USER: cinema_user
  NODE_ENV: production
  PORT: "5000"
  SEAT_LOCK_TTL: "600"
  JWT_EXPIRES_IN: 7d
  FRONTEND_URL: http://cinema-frontend-service
