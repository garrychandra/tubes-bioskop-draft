apiVersion: v1
kind: Secret
metadata:
  name: cinema-secrets
  namespace: cinema
type: Opaque
stringData:
  DB_PASSWORD: cinema_pass
  JWT_SECRET: your-super-secret-jwt-key-change-in-production
---
# Passwords required by the Bitnami postgresql-ha Helm chart.
# The key names must match what the chart expects when using existingSecret.
apiVersion: v1
kind: Secret
metadata:
  name: cinema-pg-passwords
  namespace: cinema
type: Opaque
stringData:
  password: cinema_pass                  # application user (cinema_user) password
  repmgr-password: cinema_repmgr_pass   # repmgr replication manager password
  admin-password: cinema_admin_pass      # postgres superuser password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cinema-config
  namespace: cinema
data:
  # DB_HOST points to the Bitnami pgpool service (connection pooler/router)
  DB_HOST: cinema-postgresql-ha-pgpool
  DB_PORT: "5432"
  DB_NAME: cinema_db
  DB_USER: cinema_user
  NODE_ENV: production
  PORT: "5000"
  SEAT_LOCK_TTL: "600"
  JWT_EXPIRES_IN: 7d
  # FRONTEND_URL is used by the backend for CORS and redirect headers.
  # Internally, the cinema-frontend-service listens on HTTP port 80.
  # Set this to your real HTTPS domain (e.g. https://yourdomain.com) after
  # completing Step 8 (cert-manager + Ingress TLS setup).
  FRONTEND_URL: http://cinema-frontend-service
