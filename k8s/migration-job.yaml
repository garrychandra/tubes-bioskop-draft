# One-shot Job to run database migrations and seed data.
# Run this AFTER PostgreSQL HA is ready, BEFORE deploying the backend.
#
# Usage:
#   kubectl apply -f k8s/migration-job.yaml
#   kubectl -n cinema wait --for=condition=complete job/cinema-migrate --timeout=120s
#
# To re-run: delete the old job first, then re-apply:
#   kubectl -n cinema delete job cinema-migrate
#   kubectl apply -f k8s/migration-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: cinema-migrate
  namespace: cinema
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: cinema-migrate
    spec:
      restartPolicy: OnFailure
      # Pod-level security context for the migration job.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: your-registry/cinema-backend:latest  # replace with your image
          command: ["sh", "-c", "npx sequelize-cli db:migrate && npx sequelize-cli db:seed:all"]
          # Container-level hardening — same policy as the backend pod.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: cinema-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir:
            medium: Memory
