apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-frontend
  namespace: cinema
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinema-frontend
  template:
    metadata:
      labels:
        app: cinema-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/cinema-frontend:latest  # replace with your image
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-frontend-service
  namespace: cinema
spec:
  selector:
    app: cinema-frontend
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinema-ingress
  namespace: cinema
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: cinema.example.com  # replace with your domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cinema-backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cinema-frontend-service
                port:
                  number: 80
