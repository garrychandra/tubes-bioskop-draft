apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-frontend
  namespace: cinema
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cinema-frontend
  template:
    metadata:
      labels:
        app: cinema-frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cinema-frontend
                topologyKey: kubernetes.io/hostname
      # Use the dedicated frontend service account (defined in rbac.yaml).
      serviceAccountName: cinema-frontend-sa
      # Pod-level security context.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: your-registry/cinema-frontend:latest  # replace with your image
          ports:
            - containerPort: 80
          # Container-level hardening.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          # Nginx requires writable directories for its cache, pid file, and
          # temporary client-body storage.  Mount these as emptyDirs so the
          # rest of the filesystem can stay read-only.
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp-dir
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-frontend-service
  namespace: cinema
spec:
  selector:
    app: cinema-frontend
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinema-ingress
  namespace: cinema
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: cinema.example.com  # replace with your domain or VM IP via /etc/hosts
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cinema-backend-service
                port:
                  number: 5000
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cinema-frontend-service
                port:
                  number: 80
