apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-backend
  namespace: cinema
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinema-backend
  template:
    metadata:
      labels:
        app: cinema-backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cinema-backend
                topologyKey: kubernetes.io/hostname
      # Use the dedicated backend service account (defined in rbac.yaml).
      # automountServiceAccountToken is false there so the API token is
      # not projected into the container unnecessarily.
      serviceAccountName: cinema-backend-sa
      # Pull secret created by: doctl registry kubernetes-manifest | kubectl apply -f -
      imagePullSecrets:
        - name: registry-cinema-registry
      # Pod-level security: all containers in this pod run as UID/GID 1000.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault # Apply the container runtime's default syscall filter
      containers:
        - name: backend
          image: registry.digitalocean.com/cinema-registry/cinema-backend:latest
          ports:
            - containerPort: 5000
          # Container-level security hardening.
          securityContext:
            allowPrivilegeEscalation: false # setuid/setgid binaries cannot escalate
            readOnlyRootFilesystem: true # attackers cannot write to the image FS
            capabilities:
              drop:
                - ALL # Drop every Linux capability; add back only if strictly needed
          envFrom:
            - configMapRef:
                name: cinema-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: JWT_SECRET
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: EMAIL_PASS
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: RESEND_API_KEY
            - name: DO_SPACES_KEY
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: DO_SPACES_KEY
            - name: DO_SPACES_SECRET
              valueFrom:
                secretKeyRef:
                  name: cinema-secrets
                  key: DO_SPACES_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              # Increased from 512Mi to 1Gi to reduce risk of OOM kills under
              # sustained load or a slow-query DoS scenario.
              memory: "1Gi"
              cpu: "500m"
          # /tmp is needed by Node.js for temporary files; use an in-memory
          # emptyDir so readOnlyRootFilesystem: true does not break the app.
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir:
            medium: Memory # Stored in RAM — not persisted to node disk
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-backend-service
  namespace: cinema
spec:
  selector:
    app: cinema-backend
  ports:
    - port: 5000
      targetPort: 5000
