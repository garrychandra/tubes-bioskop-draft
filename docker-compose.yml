version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cinema_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cinema_db
      POSTGRES_USER: cinema_user
      POSTGRES_PASSWORD: cinema_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema_user -d cinema_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinema_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cinema_db
      DB_USER: cinema_user
      DB_PASSWORD: cinema_pass
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
      SEAT_LOCK_TTL: 600
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5000:5000"
    command: sh -c "node src/db/migrate.js && node src/db/seed.js; node src/index.js"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinema_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:80"

volumes:
  pgdata:
